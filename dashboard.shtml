<!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Dashboard · TransformGov Talks</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="icon" type="image/png" href="/images/logo.png" />
  </head>
  <body class="w-full md:w-4/5 md:mx-auto tg-bg-ourgreen min-h-screen p-2 text-lg md:text-xl leading-relaxed">

    <div class="grid grid-cols-1 md:grid-cols-2 gap-2 md:items-stretch">
      <!--#include virtual="/includes/header.html" -->

      <main class="md:col-span-2 flex flex-col gap-2">

        <section class="p-6 md:p-8 rounded-2xl tg-bg-cell shadow">
          <h1 class="text-3xl font-extrabold mb-1">Dashboard</h1>
          <p class="opacity-60 text-base">Internal overview — not linked from the main site.</p>
        </section>

        <section class="p-6 md:p-8 rounded-2xl tg-bg-cell shadow">
          <h2 class="text-2xl font-extrabold mb-4">Mailing List</h2>

          <div id="stats-row" class="flex flex-wrap gap-6 mb-6">
            <div class="rounded-xl bg-white/70 px-6 py-4 shadow text-center min-w-[120px]">
              <p class="text-4xl font-black" id="stat-total">—</p>
              <p class="text-sm opacity-70 mt-1">Total subscribers</p>
            </div>
            <div class="rounded-xl bg-white/70 px-6 py-4 shadow text-center min-w-[120px]">
              <p class="text-4xl font-black" id="stat-month">—</p>
              <p class="text-sm opacity-70 mt-1">New this month</p>
            </div>
          </div>

          <div class="relative" style="height:320px">
            <canvas id="subscribers-chart"></canvas>
          </div>
          <p id="chart-error" class="text-red-600 text-sm mt-2 hidden"></p>
        </section>

        <section class="p-6 md:p-8 rounded-2xl tg-bg-cell shadow">
          <h2 class="text-2xl font-extrabold">Attendance</h2>
          <p class="opacity-60 text-base mt-2">Coming soon.</p>
        </section>

        <section class="p-6 md:p-8 rounded-2xl tg-bg-cell shadow">
          <h2 class="text-2xl font-extrabold mb-4">YouTube</h2>

          <div class="flex flex-wrap gap-6 mb-6">
            <div class="rounded-xl bg-white/70 px-6 py-4 shadow text-center min-w-[120px]">
              <p class="text-4xl font-black" id="yt-stat-views">—</p>
              <p class="text-sm opacity-70 mt-1">Total views</p>
            </div>
            <div class="rounded-xl bg-white/70 px-6 py-4 shadow text-center min-w-[120px]">
              <p class="text-4xl font-black" id="yt-stat-videos">—</p>
              <p class="text-sm opacity-70 mt-1">Videos</p>
            </div>
          </div>

          <div class="relative mb-6" style="height:320px">
            <canvas id="youtube-chart"></canvas>
          </div>
          <p id="yt-chart-error" class="text-red-600 text-sm mt-2 hidden"></p>

          <div class="overflow-x-auto">
            <table class="w-full text-sm border-collapse">
              <thead>
                <tr class="border-b border-black/10 text-left opacity-60">
                  <th class="py-2 pr-4 font-semibold">Date</th>
                  <th class="py-2 pr-4 font-semibold">Title</th>
                  <th class="py-2 text-right font-semibold">Views</th>
                </tr>
              </thead>
              <tbody id="yt-table-body"></tbody>
            </table>
          </div>
        </section>

      </main>

      <!--#include virtual="/includes/footer.html" -->
    </div>

    <script>
    (async () => {
      const errEl = document.getElementById("chart-error");
      try {
        const resp = await fetch("/api/subscribers/monthly");
        if (!resp.ok) throw new Error(`API returned ${resp.status}`);
        const data = await resp.json();

        const labels   = data.map(d => d.month);
        const newSubs  = data.map(d => d.new);
        const totals   = data.map(d => d.total);

        document.getElementById("stat-total").textContent = totals.at(-1) ?? "—";
        const thisMonth = new Date().toISOString().slice(0, 7);
        const thisRow   = data.find(d => d.month === thisMonth);
        document.getElementById("stat-month").textContent = thisRow ? thisRow.new : 0;

        const ctx = document.getElementById("subscribers-chart").getContext("2d");
        new Chart(ctx, {
          type: "bar",
          data: {
            labels,
            datasets: [
              {
                label: "New subscribers",
                data: newSubs,
                backgroundColor: "rgba(34,108,87,0.75)",
                borderColor: "rgba(34,108,87,1)",
                borderWidth: 1,
                order: 2,
              },
              {
                label: "Cumulative total",
                data: totals,
                type: "line",
                borderColor: "rgba(34,108,87,1)",
                backgroundColor: "rgba(34,108,87,0.1)",
                borderWidth: 2,
                pointRadius: 3,
                fill: false,
                tension: 0.3,
                order: 1,
                yAxisID: "y2",
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: "index", intersect: false },
            plugins: {
              legend: { position: "top" },
              tooltip: { callbacks: { title: items => items[0].label } },
            },
            scales: {
              x: { grid: { display: false } },
              y:  { title: { display: true, text: "New subscribers" }, beginAtZero: true },
              y2: { title: { display: true, text: "Cumulative" }, position: "right", beginAtZero: true, grid: { drawOnChartArea: false } },
            },
          },
        });
      } catch (err) {
        errEl.textContent = "Could not load chart data: " + err.message;
        errEl.classList.remove("hidden");
      }
    })();

    (async () => {
      const errEl = document.getElementById("yt-chart-error");
      try {
        const resp = await fetch("/api/youtube/videos");
        if (!resp.ok) throw new Error(`API returned ${resp.status}`);
        const data = await resp.json();

        const totalViews = data.reduce((sum, v) => sum + v.view_count, 0);
        document.getElementById("yt-stat-views").textContent = totalViews.toLocaleString();
        document.getElementById("yt-stat-videos").textContent = data.length;

        // Chart: bar = views per video, line = cumulative views
        const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
        const labels = data.map(v => {
          const d = new Date(v.published_at);
          return MONTHS[d.getUTCMonth()] + " " + d.getUTCFullYear();
        });

        const ctx = document.getElementById("youtube-chart").getContext("2d");
        new Chart(ctx, {
          type: "bar",
          data: {
            labels,
            datasets: [
              {
                label: "Views",
                data: data.map(v => v.view_count),
                backgroundColor: "rgba(34,108,87,0.75)",
                borderColor: "rgba(34,108,87,1)",
                borderWidth: 1,
                order: 2,
              },
              {
                label: "Cumulative views",
                data: data.map(v => v.cumulative_views),
                type: "line",
                borderColor: "rgba(34,108,87,1)",
                backgroundColor: "rgba(34,108,87,0.1)",
                borderWidth: 2,
                pointRadius: 3,
                fill: false,
                tension: 0.3,
                order: 1,
                yAxisID: "y2",
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: "index", intersect: false },
            plugins: {
              legend: { position: "top" },
              tooltip: {
                callbacks: {
                  title: items => data[items[0].dataIndex].title,
                },
              },
            },
            scales: {
              x: { grid: { display: false } },
              y:  { title: { display: true, text: "Views" }, beginAtZero: true },
              y2: { title: { display: true, text: "Cumulative" }, position: "right", beginAtZero: true, grid: { drawOnChartArea: false } },
            },
          },
        });

        // Table: newest first — top 2 visible, rest under twisty
        const videos = [...data].reverse();
        const tbody = document.getElementById("yt-table-body");

        function makeRow(v) {
          const d = new Date(v.published_at);
          const dateStr = d.toLocaleDateString("en-GB", { month: "short", year: "numeric", timeZone: "UTC" });
          const tr = document.createElement("tr");
          tr.className = "border-b border-black/5 hover:bg-black/5";
          tr.innerHTML = `
            <td class="py-2 pr-4 opacity-60 whitespace-nowrap">${dateStr}</td>
            <td class="py-2 pr-4">
              <a href="https://www.youtube.com/watch?v=${v.video_id}"
                 target="_blank" rel="noopener"
                 class="hover:underline">${v.title}</a>
            </td>
            <td class="py-2 text-right font-mono">${v.view_count.toLocaleString()}</td>
          `;
          return tr;
        }

        videos.slice(0, 2).forEach(v => tbody.appendChild(makeRow(v)));

        if (videos.length > 2) {
          const rest = videos.slice(2);
          const detailsRow = document.createElement("tr");
          detailsRow.innerHTML = `
            <td colspan="3" class="pt-1 pb-1">
              <details>
                <summary class="cursor-pointer text-sm opacity-60 hover:opacity-100 select-none py-1">
                  Show ${rest.length} more videos
                </summary>
                <table class="w-full mt-1"><tbody id="yt-hidden-body"></tbody></table>
              </details>
            </td>
          `;
          tbody.appendChild(detailsRow);
          const hiddenBody = detailsRow.querySelector("#yt-hidden-body");
          rest.forEach(v => hiddenBody.appendChild(makeRow(v)));
        }
      } catch (err) {
        errEl.textContent = "Could not load YouTube data: " + err.message;
        errEl.classList.remove("hidden");
      }
    })();
    </script>

  </body>
  </html>
