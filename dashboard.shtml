<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard · TransformGov Talks</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <link rel="stylesheet" href="/styles.css" />
  <link rel="icon" type="image/png" href="/images/logo.png" />
</head>
<body class="w-full md:w-4/5 md:mx-auto tg-bg-ourgreen min-h-screen p-2 text-lg md:text-xl leading-relaxed">

  <div class="grid grid-cols-1 md:grid-cols-2 gap-2 md:items-stretch">
    <!--#include virtual="/includes/header.html" -->

    <main class="md:col-span-2 flex flex-col gap-2">

      <section class="p-6 md:p-8 rounded-2xl tg-bg-cell shadow">
        <h1 class="text-3xl font-extrabold mb-1">Dashboard</h1>
        <p class="opacity-60 text-base">Internal overview — not linked from the main site.</p>
      </section>

      <section class="p-6 md:p-8 rounded-2xl tg-bg-cell shadow">
        <h2 class="text-2xl font-extrabold mb-4">Mailing List</h2>

        <div id="stats-row" class="flex flex-wrap gap-6 mb-6">
          <div class="rounded-xl bg-white/70 px-6 py-4 shadow text-center min-w-[120px]">
            <p class="text-4xl font-black" id="stat-total">—</p>
            <p class="text-sm opacity-70 mt-1">Total subscribers</p>
          </div>
          <div class="rounded-xl bg-white/70 px-6 py-4 shadow text-center min-w-[120px]">
            <p class="text-4xl font-black" id="stat-month">—</p>
            <p class="text-sm opacity-70 mt-1">New this month</p>
          </div>
        </div>

        <div class="relative" style="height:320px">
          <canvas id="subscribers-chart"></canvas>
        </div>
        <p id="chart-error" class="text-red-600 text-sm mt-2 hidden"></p>
      </section>

      <section class="p-6 md:p-8 rounded-2xl tg-bg-cell shadow">
        <h2 class="text-2xl font-extrabold">Attendance</h2>
        <p class="opacity-60 text-base mt-2">Coming soon.</p>
      </section>

    </main>

    <!--#include virtual="/includes/footer.html" -->
  </div>

  <script>
  (async () => {
    const errEl = document.getElementById("chart-error");
    try {
      const resp = await fetch("/api/subscribers/monthly");
      if (!resp.ok) throw new Error(`API returned ${resp.status}`);
      const data = await resp.json();

      const labels   = data.map(d => d.month);
      const newSubs  = data.map(d => d.new);
      const totals   = data.map(d => d.total);

      // Summary stats
      document.getElementById("stat-total").textContent = totals.at(-1) ?? "—";
      const thisMonth = new Date().toISOString().slice(0, 7);
      const thisRow   = data.find(d => d.month === thisMonth);
      document.getElementById("stat-month").textContent = thisRow ? thisRow.new : 0;

      const ctx = document.getElementById("subscribers-chart").getContext("2d");
      new Chart(ctx, {
        type: "bar",
        data: {
          labels,
          datasets: [
            {
              label: "New subscribers",
              data: newSubs,
              backgroundColor: "rgba(34,108,87,0.75)",
              borderColor: "rgba(34,108,87,1)",
              borderWidth: 1,
              order: 2,
            },
            {
              label: "Cumulative total",
              data: totals,
              type: "line",
              borderColor: "rgba(34,108,87,1)",
              backgroundColor: "rgba(34,108,87,0.1)",
              borderWidth: 2,
              pointRadius: 3,
              fill: false,
              tension: 0.3,
              order: 1,
              yAxisID: "y2",
            },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: "index", intersect: false },
          plugins: {
            legend: { position: "top" },
            tooltip: { callbacks: {
              title: items => items[0].label,
            }},
          },
          scales: {
            x: { grid: { display: false } },
            y:  { title: { display: true, text: "New subscribers" }, beginAtZero: true },
            y2: { title: { display: true, text: "Cumulative" }, position: "right", beginAtZero: true, grid: { drawOnChartArea: false } },
          },
        },
      });
    } catch (err) {
      errEl.textContent = "Could not load chart data: " + err.message;
      errEl.classList.remove("hidden");
    }
  })();
  </script>

</body>
</html>
